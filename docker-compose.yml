version: '3.8'

services:
  app:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  uploads:
